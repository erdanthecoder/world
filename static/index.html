<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<title>ReadWorld — Read. Think. Grow.</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<!-- ===================== WELCOME / PROFILE ===================== -->
<div id="welcome-screen" class="screen hidden">
  <div class="welcome-card">
    <div class="welcome-logo">📖</div>
    <h1>ReadWorld</h1>
    <p class="welcome-tag">Read. Think. Grow. &nbsp;·&nbsp; Читай. Думай. Расти.</p>
    <label class="field-label" for="profile-name">What's your name? / Как тебя зовут?</label>
    <input id="profile-name" type="text" maxlength="24" placeholder="Your name…" autocomplete="off">
    <button id="btn-start" class="btn btn-primary btn-lg">Start Reading →</button>
    <div class="welcome-sync">
      <span>Already have a sync code from another device?</span>
      <button id="btn-restore" class="btn btn-ghost">Restore my progress</button>
    </div>
  </div>
</div>

<!-- ===================== LIBRARY ===================== -->
<div id="library-screen" class="screen hidden">
  <header class="lib-header">
    <div class="lib-header-inner">
      <div class="lib-brand">
        <span class="lib-logo">📖</span>
        <div>
          <div class="lib-title">ReadWorld</div>
          <div class="lib-sub" id="lib-greeting">Hello!</div>
        </div>
      </div>
      <div class="lib-actions">
        <button id="btn-stats" class="icon-btn" title="My progress">🏆</button>
        <button id="btn-sync" class="icon-btn" title="Sync across devices">🔄</button>
        <button id="btn-profile" class="icon-btn" title="Profile">👤</button>
      </div>
    </div>
    <div class="lib-search-row">
      <input id="lib-search" type="search" placeholder="Search books… / Поиск книг…">
    </div>
    <nav class="lib-filters" id="lib-filters">
      <button class="chip active" data-filter="all">All books</button>
      <button class="chip" data-filter="continue">📚 Continue</button>
      <button class="chip" data-filter="en">🇬🇧 English</button>
      <button class="chip" data-filter="ru">🇷🇺 Русский</button>
      <button class="chip" data-filter="science">🔬 Science</button>
      <button class="chip" data-filter="maths">📐 Maths</button>
      <button class="chip" data-filter="fiction">✨ Stories</button>
    </nav>
    <nav class="lib-filters lib-years" id="lib-years">
      <button class="chip yr active" data-year="all">All years</button>
      <button class="chip yr" data-year="4">Year 4</button>
      <button class="chip yr" data-year="5">Year 5</button>
      <button class="chip yr" data-year="6">Year 6</button>
      <button class="chip yr" data-year="7">Year 7</button>
      <button class="chip yr" data-year="8">Year 8</button>
      <button class="chip yr" data-year="9">Year 9</button>
    </nav>
  </header>
  <main id="lib-shelves" class="lib-shelves"></main>
  <footer class="lib-footer">ReadWorld · A family reading project · Classic texts presented as adapted graded-reader editions</footer>
</div>

<!-- ===================== BOOK DETAILS ===================== -->
<div id="detail-screen" class="screen hidden">
  <div class="detail-wrap">
    <button class="btn btn-ghost detail-back" id="btn-detail-back">← Library</button>
    <div class="detail-card" id="detail-card"></div>
  </div>
</div>

<!-- ===================== READER ===================== -->
<div id="reader-screen" class="screen hidden">
  <header class="reader-top" id="reader-top">
    <button class="icon-btn" id="btn-reader-back" title="Back to library">←</button>
    <div class="reader-book-title" id="reader-book-title"></div>
    <div class="reader-top-actions">
      <button class="icon-btn" id="btn-toc" title="Contents">☰</button>
      <button class="icon-btn" id="btn-settings" title="Display settings">Aa</button>
    </div>
  </header>

  <div class="reader-stage" id="reader-stage">
    <div class="reader-viewport" id="reader-viewport">
      <div class="reader-content" id="reader-content"></div>
    </div>
    <div class="tap-zone tap-left" id="tap-left"></div>
    <div class="tap-zone tap-right" id="tap-right"></div>
  </div>

  <footer class="reader-bottom" id="reader-bottom">
    <div class="reader-progressbar"><div class="reader-progress-fill" id="reader-progress-fill"></div></div>
    <div class="reader-meta">
      <span id="reader-chapter-label"></span>
      <span id="reader-page-label"></span>
      <span id="reader-percent-label"></span>
    </div>
  </footer>

  <!-- TOC drawer -->
  <div class="drawer-backdrop hidden" id="toc-backdrop"></div>
  <aside class="toc-drawer hidden" id="toc-drawer">
    <div class="toc-head">Contents · Оглавление</div>
    <div id="toc-list"></div>
  </aside>

  <!-- Display settings popover -->
  <div class="settings-pop hidden" id="settings-pop">
    <div class="set-row">
      <span class="set-label">Font size</span>
      <div class="set-controls">
        <button class="set-btn" data-act="font-">A−</button>
        <button class="set-btn" data-act="font+">A+</button>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">Line spacing</span>
      <div class="set-controls">
        <button class="set-btn" data-act="line-">≡−</button>
        <button class="set-btn" data-act="line+">≡+</button>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">Font</span>
      <div class="set-controls">
        <button class="set-btn" data-act="serif">Serif</button>
        <button class="set-btn" data-act="sans">Sans</button>
      </div>
    </div>
    <div class="set-row">
      <span class="set-label">Theme</span>
      <div class="set-controls">
        <button class="theme-dot theme-light" data-act="th-light" title="Light"></button>
        <button class="theme-dot theme-sepia" data-act="th-sepia" title="Sepia"></button>
        <button class="theme-dot theme-dark" data-act="th-dark" title="Dark"></button>
      </div>
    </div>
  </div>
</div>

<!-- ===================== QUIZ ===================== -->
<div id="quiz-overlay" class="overlay hidden">
  <div class="quiz-card" id="quiz-card"></div>
</div>

<!-- ===================== GENERIC MODAL ===================== -->
<div id="modal-overlay" class="overlay hidden">
  <div class="modal-card" id="modal-card"></div>
</div>

<div id="toast" class="toast hidden"></div>

<script src="js/data/en_science.js"></script>
<script src="js/data/en_maths.js"></script>
<script src="js/data/en_fiction.js"></script>
<script src="js/data/ru_fiction.js"></script>
<script src="js/data/ru_edu.js"></script>
<script src="js/app.js"></script>
</body>
</html>
