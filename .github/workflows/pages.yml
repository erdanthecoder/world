name: Deploy ReadWorld to GitHub Pages

# Publishes the static site in docs/ to GitHub Pages.
# Deploys only from the default branch (the github-pages environment is
# restricted to it); feature-branch pushes would only fail and, worse,
# cancel an in-flight main deploy through the shared concurrency group.
on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-progress deploy finish rather
# than cancelling it (a cancelled Pages deploy leaves the site un-updated).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
